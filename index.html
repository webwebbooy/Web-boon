<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WEB-BOON</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #3D2C2E;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            font-family: 'Fredoka One', cursive;
        }

        /* Container - Centered */
        .container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* Glow circle behind logo */
        .glow-circle {
            position: absolute;
            width: 0px;
            height: 0px;
            background: radial-gradient(circle, rgba(255,107,53,0.3) 0%, rgba(255,107,53,0) 70%);
            border-radius: 50%;
            opacity: 0;
            animation: glowExpand 1.5s ease-out 0.5s forwards;
        }

        @keyframes glowExpand {
            0% {
                width: 0px;
                height: 0px;
                opacity: 0;
            }
            50% {
                opacity: 1;
            }
            100% {
                width: 500px;
                height: 500px;
                opacity: 0.8;
            }
        }

        /* Logo Container - Perfectly Centered */
        .logo {
            position: relative;
            z-index: 10;
            opacity: 0;
            transform: scale(0.3) translateY(50px);
            text-align: center;
            animation: logoReveal 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) 1.5s forwards;
        }

        @keyframes logoReveal {
            0% {
                opacity: 0;
                transform: scale(0.3) translateY(50px);
            }
            100% {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .logo-text {
            font-size: 80px;
            color: #FF6B35;
            letter-spacing: 5px;
            -webkit-text-stroke: 4px #000;
            text-shadow: 
                5px 5px 0 #000,
                -2px -2px 0 #000,
                2px -2px 0 #000,
                -2px 2px 0 #000,
                0 6px 0 #000;
            paint-order: stroke fill;
        }

        /* Logo glow animation after reveal */
        .logo.revealed .logo-text {
            animation: logoGlow 2s ease-in-out infinite;
        }

        @keyframes logoGlow {
            0%, 100% {
                filter: drop-shadow(0 0 10px rgba(255,107,53,0.3));
            }
            50% {
                filter: drop-shadow(0 0 25px rgba(255,107,53,0.6));
            }
        }

        .tagline {
            font-size: 22px;
            color: #FFF8F0;
            letter-spacing: 2px;
            margin-top: 25px;
            opacity: 0;
            text-shadow: 2px 2px 0 #000;
            animation: fadeInUp 0.6s ease-out 2.5s forwards;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Pulse rings */
        .pulse-ring {
            position: absolute;
            width: 100px;
            height: 100px;
            border: 3px solid rgba(255, 107, 53, 0.4);
            border-radius: 50%;
            opacity: 0;
            z-index: 5;
        }

        .pulse-ring:nth-child(2) {
            animation: pulseRing 1.2s ease-out 1.8s forwards;
        }

        .pulse-ring:nth-child(3) {
            animation: pulseRing 1.2s ease-out 2s forwards;
        }

        .pulse-ring:nth-child(4) {
            animation: pulseRing 1.2s ease-out 2.2s forwards;
        }

        @keyframes pulseRing {
            0% {
                width: 100px;
                height: 100px;
                opacity: 0.7;
            }
            100% {
                width: 450px;
                height: 450px;
                opacity: 0;
            }
        }

        /* Sparkles */
        .sparkle {
            position: absolute;
            width: 8px;
            height: 8px;
            background: #FFD90F;
            border-radius: 50%;
            opacity: 0;
            z-index: 15;
            box-shadow: 0 0 10px #FFD90F, 0 0 20px #FFD90F;
        }

        .sparkle:nth-child(5) { top: 38%; left: 25%; animation: sparkle 0.6s ease-out 2.3s forwards; }
        .sparkle:nth-child(6) { top: 32%; right: 25%; animation: sparkle 0.6s ease-out 2.5s forwards; }
        .sparkle:nth-child(7) { top: 58%; left: 22%; animation: sparkle 0.6s ease-out 2.4s forwards; }
        .sparkle:nth-child(8) { top: 62%; right: 23%; animation: sparkle 0.6s ease-out 2.6s forwards; }
        .sparkle:nth-child(9) { top: 45%; left: 18%; animation: sparkle 0.6s ease-out 2.7s forwards; }
        .sparkle:nth-child(10) { top: 50%; right: 18%; animation: sparkle 0.6s ease-out 2.8s forwards; }

        @keyframes sparkle {
            0% { transform: scale(0); opacity: 0; }
            50% { transform: scale(1.8); opacity: 1; }
            100% { transform: scale(0); opacity: 0; }
        }

        /* Skip text */
        .skip-text {
            position: fixed;
            bottom: 30px;
            right: 30px;
            font-size: 16px;
            color: rgba(255, 248, 240, 0.4);
            cursor: pointer;
            opacity: 0;
            z-index: 100;
            transition: all 0.3s;
        }

        .skip-text.visible {
            opacity: 1;
        }

        .skip-text:hover {
            color: #FFD90F;
        }

        /* Fade out overlay */
        .fade-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #FFF8F0;
            opacity: 0;
            z-index: 1000;
            pointer-events: none;
            transition: opacity 0.6s ease-out;
        }

        .fade-overlay.active {
            opacity: 1;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .logo-text {
                font-size: 52px;
                letter-spacing: 3px;
                -webkit-text-stroke: 3px #000;
            }
            .tagline {
                font-size: 16px;
                padding: 0 20px;
            }
            .glow-circle {
                animation: glowExpandMobile 1.5s ease-out 0.5s forwards;
            }
            @keyframes glowExpandMobile {
                0% { width: 0px; height: 0px; opacity: 0; }
                50% { opacity: 1; }
                100% { width: 300px; height: 300px; opacity: 0.8; }
            }
        }

        @media (max-width: 480px) {
            .logo-text {
                font-size: 40px;
                letter-spacing: 2px;
                -webkit-text-stroke: 2px #000;
            }
            .tagline {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>

    <!-- Fade overlay for smooth transition -->
    <div class="fade-overlay" id="fadeOverlay"></div>

    <div class="container">
        <!-- Subtle glow behind logo -->
        <div class="glow-circle"></div>
        
        <!-- Pulse rings -->
        <div class="pulse-ring"></div>
        <div class="pulse-ring"></div>
        <div class="pulse-ring"></div>
        
        <!-- Sparkles -->
        <div class="sparkle"></div>
        <div class="sparkle"></div>
        <div class="sparkle"></div>
        <div class="sparkle"></div>
        <div class="sparkle"></div>
        <div class="sparkle"></div>
        
        <!-- Logo - Centered -->
        <div class="logo" id="logo">
            <div class="logo-text">WEB-BOON</div>
            <div class="tagline">Breaking Bad Websites, Building Great Ones</div>
        </div>
    </div>

    <!-- Skip text -->
    <div class="skip-text" id="skipText">Click anywhere to skip →</div>

    <script>
        // ===== AUDIO =====
        let audioCtx = null;

        function ensureAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        // Deep whoosh sound (glow expanding)
        function playWhoosh() {
            try {
                ensureAudio();
                
                // Deep bass whoosh
                const o1 = audioCtx.createOscillator();
                const g1 = audioCtx.createGain();
                o1.connect(g1);
                g1.connect(audioCtx.destination);
                o1.type = 'sine';
                o1.frequency.setValueAtTime(60, audioCtx.currentTime);
                o1.frequency.exponentialRampToValueAtTime(200, audioCtx.currentTime + 0.5);
                o1.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 1.2);
                g1.gain.setValueAtTime(0.25, audioCtx.currentTime);
                g1.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 1.2);
                o1.start();
                o1.stop(audioCtx.currentTime + 1.2);

                // Shimmer layer
                const o2 = audioCtx.createOscillator();
                const g2 = audioCtx.createGain();
                o2.connect(g2);
                g2.connect(audioCtx.destination);
                o2.type = 'triangle';
                o2.frequency.setValueAtTime(300, audioCtx.currentTime + 0.3);
                o2.frequency.exponentialRampToValueAtTime(600, audioCtx.currentTime + 0.8);
                g2.gain.setValueAtTime(0.08, audioCtx.currentTime + 0.3);
                g2.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 1);
                o2.start(audioCtx.currentTime + 0.3);
                o2.stop(audioCtx.currentTime + 1);
            } catch (e) {}
        }

        // Logo reveal sound (impact + shine)
        function playReveal() {
            try {
                ensureAudio();
                
                // Impact thud
                const o1 = audioCtx.createOscillator();
                const g1 = audioCtx.createGain();
                o1.connect(g1);
                g1.connect(audioCtx.destination);
                o1.type = 'sine';
                o1.frequency.setValueAtTime(180, audioCtx.currentTime);
                o1.frequency.exponentialRampToValueAtTime(60, audioCtx.currentTime + 0.25);
                g1.gain.setValueAtTime(0.3, audioCtx.currentTime);
                g1.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.35);
                o1.start();
                o1.stop(audioCtx.currentTime + 0.35);

                // Bright shimmer
                const o2 = audioCtx.createOscillator();
                const g2 = audioCtx.createGain();
                o2.connect(g2);
                g2.connect(audioCtx.destination);
                o2.type = 'sine';
                o2.frequency.setValueAtTime(500, audioCtx.currentTime + 0.15);
                o2.frequency.exponentialRampToValueAtTime(1000, audioCtx.currentTime + 0.5);
                g2.gain.setValueAtTime(0.1, audioCtx.currentTime + 0.15);
                g2.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.6);
                o2.start(audioCtx.currentTime + 0.15);
                o2.stop(audioCtx.currentTime + 0.6);
            } catch (e) {}
        }

        // Magical success chime
        function playChime() {
            try {
                ensureAudio();
                const notes = [523, 659, 784, 1047];
                notes.forEach((freq, i) => {
                    const o = audioCtx.createOscillator();
                    const g = audioCtx.createGain();
                    o.connect(g);
                    g.connect(audioCtx.destination);
                    o.type = 'sine';
                    o.frequency.setValueAtTime(freq, audioCtx.currentTime + i * 0.12);
                    g.gain.setValueAtTime(0, audioCtx.currentTime + i * 0.12);
                    g.gain.linearRampToValueAtTime(0.2, audioCtx.currentTime + i * 0.12 + 0.05);
                    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + i * 0.12 + 0.5);
                    o.start(audioCtx.currentTime + i * 0.12);
                    o.stop(audioCtx.currentTime + i * 0.12 + 0.5);
                });
            } catch (e) {}
        }

        // Sparkle sound
        function playSparkle() {
            try {
                ensureAudio();
                const o = audioCtx.createOscillator();
                const g = audioCtx.createGain();
                o.connect(g);
                g.connect(audioCtx.destination);
                o.type = 'sine';
                o.frequency.setValueAtTime(1200, audioCtx.currentTime);
                o.frequency.exponentialRampToValueAtTime(1800, audioCtx.currentTime + 0.15);
                g.gain.setValueAtTime(0.08, audioCtx.currentTime);
                g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.2);
                o.start();
                o.stop(audioCtx.currentTime + 0.2);
            } catch (e) {}
        }

        // ===== VARIABLES =====
        const skipText = document.getElementById('skipText');
        const fadeOverlay = document.getElementById('fadeOverlay');
        const logo = document.getElementById('logo');
        let canSkip = false;
        let hasRedirected = false;

        // ===== REDIRECT =====
        function redirectToIndex() {
            if (hasRedirected) return;
            hasRedirected = true;
            
            // Smooth fade to cream (matches index.html background)
            fadeOverlay.classList.add('active');
            
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 600);
        }

        // ===== ANIMATION TIMELINE =====
        function startAnimation() {
            
            // 0.5s - Glow starts + whoosh
            setTimeout(() => {
                playWhoosh();
            }, 500);

            // 1.2s - Can skip
            setTimeout(() => {
                canSkip = true;
                skipText.classList.add('visible');
            }, 1200);

            // 1.5s - Logo reveals + reveal sound
            setTimeout(() => {
                playReveal();
            }, 1500);

            // 2.3s - Logo glow starts + sparkle sounds
            setTimeout(() => {
                logo.classList.add('revealed');
                playSparkle();
            }, 2300);

            // 2.5s - Tagline + chime
            setTimeout(() => {
                playChime();
            }, 2500);

            // 3s - More sparkles
            setTimeout(() => {
                playSparkle();
            }, 3000);

            // 5.5s - Redirect
            setTimeout(() => {
                redirectToIndex();
            }, 5500);
        }

        // ===== SKIP =====
        document.addEventListener('click', () => {
            if (canSkip) redirectToIndex();
        });

        document.addEventListener('touchstart', () => {
            if (canSkip) redirectToIndex();
        });

        // ===== START =====
        window.addEventListener('load', startAnimation);
    </script>
</body>
</html>
